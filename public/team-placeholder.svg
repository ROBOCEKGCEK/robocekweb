<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Decorative circles representing team members -->
  <g opacity="0.15">
    <!-- Row 1 -->
    <circle cx="200" cy="250" r="60" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="400" cy="220" r="70" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="600" cy="200" r="75" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="800" cy="220" r="70" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="1000" cy="250" r="60" fill="none" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Row 2 -->
    <circle cx="150" cy="450" r="65" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="350" cy="420" r="72" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="550" cy="400" r="78" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="750" cy="420" r="72" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="950" cy="450" r="65" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="1050" cy="480" r="50" fill="none" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- Center accent -->
  <circle cx="600" cy="400" r="120" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
  
  <!-- Text overlay -->
  <text x="600" y="150" font-family="monospace" font-size="48" font-weight="bold" 
        text-anchor="middle" fill="#ffffff" opacity="0.3">ROBOCEK TEAM</text>
  
  <!-- Tech elements -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1" fill="none">
    <!-- Connected nodes -->
    <line x1="300" y1="300" x2="400" y2="350"/>
    <line x1="400" y1="350" x2="600" y2="400"/>
    <line x1="600" y1="400" x2="800" y2="350"/>
    <line x1="800" y1="350" x2="900" y2="300"/>
    
    <circle cx="300" cy="300" r="3" fill="#ffffff"/>
    <circle cx="400" cy="350" r="3" fill="#ffffff"/>
    <circle cx="600" cy="400" r="3" fill="#ffffff"/>
    <circle cx="800" cy="350" r="3" fill="#ffffff"/>
    <circle cx="900" cy="300" r="3" fill="#ffffff"/>
  </g>
</svg>
